<!DOCTYPE html>
<html lang="en"><head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neurosight - Online Pre-Hire Assessment</title>
<meta name="description" content="Neurosight provides short, scientifically validated psychometric assessments that predict job performance, deliver AI resilience, and strips the bias out of volume and early-career hiring.">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ns-display: 'Space Grotesk', system-ui, sans-serif;
    --ns-body: 'Inter', system-ui, sans-serif;
    --ns-mono: 'JetBrains Mono', ui-monospace, monospace;
    --ns-white: oklch(0.97 0.008 95);
    --ns-yellow: oklch(0.92 0.18 98);
    --ns-cyan: oklch(0.82 0.18 200);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #000; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    font-family: var(--ns-body);
    color: var(--ns-white);
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: oklch(0.92 0.18 98 / 0.4); color: #000; }

  /* ═══ Mobile mode (body.ns-mobile): device fills viewport ═══ */
  body.ns-mobile { overflow: hidden; }
  body.ns-mobile #root { width: 100%; height: 100dvh; }
  /* Mobile density scaling for small Android phones */
  @media (max-width: 420px) {
    body.ns-mobile .phone-scroll { zoom: 0.88; }
  }
  .phone-scroll::-webkit-scrollbar { width: 0; }

  /* ═══ Desktop mode (body.ns-desktop): regular scrolling page ═══ */
  body.ns-desktop { overflow-x: hidden; }

  /* ═══ Shared keyframes used by both layouts ═══ */
  @keyframes ns-caret { 0%, 50% { opacity: 0.85; } 50.01%, 100% { opacity: 0; } }
  @keyframes ns-caret-fade { 0% { opacity: 0.85; } 100% { opacity: 0; } }
  @keyframes ns-pulse {
    0%   { transform: scale(1);   opacity: 0.9; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes ns-pulse-bold {
    0%   { transform: scale(1);   opacity: 1; }
    100% { transform: scale(3.6); opacity: 0; }
  }
  @keyframes ns-rainbow {
    0%   { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }
  @keyframes ns-ripple {
    0%   { width: 0; height: 0; opacity: 0.95; }
    100% { width: 270px; height: 270px; opacity: 0; }
  }
  @keyframes ns-num-pulse {
    0%   { transform: scale(0.6); opacity: 0.9; border-width: 2px; }
    60%  { opacity: 0.45; }
    100% { transform: scale(4.2); opacity: 0; border-width: 1px; }
  }
  @keyframes ns-num-halo {
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
    18%  { transform: translate(-50%, -50%) scale(1.3); opacity: 0.95; }
    100% { transform: translate(-50%, -50%) scale(5.5); opacity: 0; }
  }
  @keyframes ns-cmp-halo {
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
    22%  { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
    100% { transform: translate(-50%, -50%) scale(4.5); opacity: 0; }
  }
  @keyframes ns-cmp-glow {
    0%   { text-shadow: 0 0 0 oklch(0.82 0.18 200 / 0); color: oklch(0.82 0.18 200); }
    28%  { text-shadow: 0 0 6px oklch(0.82 0.18 200 / 0.95), 0 0 14px oklch(0.82 0.18 200 / 0.85), 0 0 28px oklch(0.82 0.18 200 / 0.55); color: oklch(0.96 0.12 200); }
    100% { text-shadow: 0 0 14px oklch(0.82 0.18 200 / 0), 0 0 38px oklch(0.82 0.18 200 / 0), 0 0 72px oklch(0.82 0.18 200 / 0); color: oklch(0.82 0.18 200); }
  }
  @keyframes ns-num-glow {
    0%   { text-shadow: 0 0 0 oklch(0.72 0.26 8 / 0); color: oklch(0.72 0.26 8); }
    25%  { text-shadow: 0 0 6px oklch(0.72 0.26 8 / 0.95), 0 0 14px oklch(0.72 0.26 8 / 0.85), 0 0 28px oklch(0.72 0.26 8 / 0.55); color: oklch(0.95 0.12 25); }
    100% { text-shadow: 0 0 14px oklch(0.72 0.26 8 / 0), 0 0 38px oklch(0.72 0.26 8 / 0), 0 0 72px oklch(0.72 0.26 8 / 0); color: oklch(0.72 0.26 8); }
  }
  @keyframes ns-flash {
    0%   { transform: translateX(-100%); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translateX(100%); opacity: 0; }
  }
  @keyframes ns-brand-fade { 0% { opacity: 0; transform: translateY(-4px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes ns-brand-rise { 0% { opacity: 0; transform: translateY(10px); filter: blur(4px); } 60% { opacity: 1; filter: blur(0); } 100% { opacity: 1; transform: translateY(0); filter: blur(0); } }
  @keyframes ns-brand-flash { 0% { opacity: 0.3; } 30% { opacity: 1; } 100% { opacity: 1; } }
  @keyframes ns-brand-progress { 0% { transform: scaleX(0); transform-origin: left; } 100% { transform: scaleX(1); transform-origin: left; } }
  /* Two marquee variants — mobile uses -50%, desktop uses -33.333%. Each layout only loads its own. */
  @keyframes ns-marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  @keyframes ns-marquee-rev { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }
  @keyframes ns-marquee-d { 0% { transform: translateX(0); } 100% { transform: translateX(-33.333%); } }
  @keyframes ns-marquee-d-rev { 0% { transform: translateX(-33.333%); } 100% { transform: translateX(0); } }
  @keyframes ns-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }
  @keyframes ns-scroll-bob { 0%, 100% { transform: translateY(0); opacity: 0.85; } 50% { transform: translateY(6px); opacity: 1; } }
  @keyframes ns-chev-left { 0%, 100% { transform: translateX(0); opacity: 0.85; } 50% { transform: translateX(-3px); opacity: 1; } }
  @keyframes ns-chev-right { 0%, 100% { transform: translateX(0); opacity: 0.85; } 50% { transform: translateX(3px); opacity: 1; } }
  .ns-marquee-track { padding-right: 10px; }
  .paused .ns-marquee-track { animation-play-state: paused; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script>
  // ═══ Responsive entry: pick mobile or desktop by viewport ═══
  // Threshold: ≥900px = desktop, <900px = mobile.
  // Updates on resize (React re-mounts the tree, no full reload).
  (function() {
    const MQ = '(min-width: 900px)';
    function applyBodyClass() {
      const isDesktop = window.matchMedia(MQ).matches;
      document.body.classList.toggle('ns-desktop', isDesktop);
      document.body.classList.toggle('ns-mobile', !isDesktop);
      window.__nsIsDesktop = isDesktop;
    }
    // Apply synchronously as early as possible
    function boot() { applyBodyClass(); }
    if (document.body) boot();
    else document.addEventListener('DOMContentLoaded', boot);
    // Listen for crossover
    const mql = window.matchMedia(MQ);
    const handler = () => {
      applyBodyClass();
      window.dispatchEvent(new CustomEvent('__ns_viewport_change'));
    };
    mql.addEventListener ? mql.addEventListener('change', handler) : mql.addListener(handler);
  })();
</script>

<script>
  // ═══ Smooth anchor scroll (desktop) ═══
  // Custom easing for satisfying zoom to section on nav/CTA clicks.
  (function() {
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    function easeInOutQuart(t) { return t < 0.5 ? 8*t*t*t*t : 1 - Math.pow(-2*t+2, 4)/2; }
    function smoothScrollTo(targetY, duration) {
      const startY = window.scrollY;
      const dy = targetY - startY;
      if (Math.abs(dy) < 2) return;
      const start = performance.now();
      function frame(now) {
        const t = Math.min(1, (now - start) / duration);
        window.scrollTo(0, startY + dy * easeInOutQuart(t));
        if (t < 1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }
    document.addEventListener('click', (e) => {
      // Only hijack desktop anchor clicks; mobile uses its own scroll container
      if (!window.__nsIsDesktop) return;
      const a = e.target.closest('a[href^="#"]');
      if (!a) return;
      const href = a.getAttribute('href');
      if (!href || href === '#' || href.length < 2) return;
      const el = document.getElementById(href.slice(1));
      if (!el) return;
      e.preventDefault();
      const rect = el.getBoundingClientRect();
      const sectionCenter = rect.top + window.scrollY + rect.height / 2;
      const targetY = Math.max(0, sectionCenter - window.innerHeight / 2);
      if (reduce) { window.scrollTo(0, targetY); return; }
      const dist = Math.abs(targetY - window.scrollY);
      smoothScrollTo(targetY, Math.min(900, Math.max(500, dist * 0.25)));
      history.replaceState(null, '', href);
    });
  })();
</script>

</body></html>
